server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Repassa tudo em /api/ pro container "api" (nome do servico no
    # docker-compose.yml). O Docker Compose cria uma rede interna onde
    # cada servico enxerga os outros pelo proprio nome.
    location /api/ {
        proxy_pass http://api:5000/;
        proxy_set_header Host $host;
    }
}
